spring.application.name=ZARA Interpreter Web

# Server Configuration
# Read PORT from environment (Render sets this), fall back to 8080 locally
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.zara.interpreter=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Web Configuration
spring.web.resources.cache.period=3600
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.html

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Application-specific settings
zara.max-execution-time-ms=30000
zara.max-output-lines=10000
